{{ template "layout" . }}

{{ define "content" }}
<section class="auth-section">
    <div class="auth-form-wrap mx-auto" style="max-width: 400px; margin: 4rem auto; padding: 2rem; background: var(--bg-card); border: var(--border); border-radius: 8px;">
        <h1 style="margin-bottom: 2rem; text-align: center;">Login to Admin</h1>
        
        {{ if .Error }}
        <div class="alert alert-danger" style="color: #ff4a4a; background: rgba(255,74,74,0.1); margin-bottom: 1rem; border: 1px solid #ff4a4a; padding: 0.75rem; border-radius: 4px;">
            {{ .Error }}
        </div>
        {{ end }}

        <form action="/login" method="POST">
            <div class="form-group" style="margin-bottom: 1.5rem;">
                <label for="username" style="display: block; margin-bottom: 0.5rem; color: var(--text-muted);">Username</label>
                <input type="text" id="username" name="username" class="form-control" style="width: 100%; padding: 0.75rem; border: var(--border); border-radius: 4px; background: transparent; color: inherit; box-sizing: border-box;" required autofocus>
            </div>
            
            <div class="form-group" style="margin-bottom: 2rem;">
                <label for="password" style="display: block; margin-bottom: 0.5rem; color: var(--text-muted);">Password</label>
                <input type="password" id="password" name="password" class="form-control" style="width: 100%; padding: 0.75rem; border: var(--border); border-radius: 4px; background: transparent; color: inherit; box-sizing: border-box;" required>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 0.75rem; font-size: 1rem;">Login</button>
        </form>
    </div>
</section>
{{ end }}
